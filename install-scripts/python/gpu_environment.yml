# To set up a development environment using conda run:
#
#   conda env create -f environment.yml
#   conda activate bipca-experiment
#   pip install -e .
name: bipca-experiment
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - python=3.10
  - pip
  - mkl
  - numba
  - numpy<2
  - pytables
  - bedtools
  - htslib
  - pybedtools
  - plink
  - plink2
  - ccache
  - pip:
    - --requirement requirements.txt
